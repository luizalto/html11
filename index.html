<style>
body {
  margin: 0;
  height: 100vh;
  background-color: #E74B2E;

<body>

<a href="#" id="btnShopee" class="botao">Abrir a Shopee</a>

<script>
(function(){

// ================= TRACK =================
function track(event, data={}){
  fbq('trackCustom', event, data);
}

// ================= PARAMETROS =================
const params = new URLSearchParams(window.location.search);

let LINK = null;
let UC = null;

const raw = params.get("dest");

if (raw && raw.includes("|||")) {
  const partes = raw.split("|||");
  LINK = partes[0];
  UC = partes[1];
} else {
  LINK = params.get("dest");
  UC = params.get("uc");
}

if (!LINK || !UC) {
  alert("Erro parâmetros");
  throw new Error("Parâmetros inválidos");
}

// ================= TEMPO =================
let tempo = 0;
let tempoLabel = "S0";

setInterval(()=>{
  tempo++;
  if(tempo<=30){
    tempoLabel = "S"+(tempo-1)+"a"+tempo;
    track("Tempo_"+tempoLabel);
  }
},1000);

// ================= VELOCIDADE =================
let nivel = null;
let statusVelocidade = "NR"; // NR = não resolvido

function classificar(mbps){
  if (mbps <= 1) return 1;
  if (mbps <= 2) return 2;
  if (mbps <= 4) return 3;
  if (mbps <= 8) return 4;
  if (mbps <= 16) return 5;
  if (mbps <= 32) return 6;
  if (mbps <= 64) return 7;
  if (mbps <= 128) return 8;
  if (mbps <= 256) return 9;
  return 10;
}

function testarVelocidade(){
  return new Promise((resolve)=>{
    const img = new Image();
    const start = Date.now();
    const size = 500000;

    img.onload = ()=>{
      const duration = (Date.now()-start)/1000;
      const speed = (size*8/duration)/(1024*1024);
      resolve(speed);
    };

    img.onerror = ()=> resolve(null);

    img.src = "https://via.placeholder.com/1000x1000.jpg?"+Math.random();
  });
}

testarVelocidade().then(speed=>{
  if(speed){
    nivel = classificar(speed);
    statusVelocidade = "OK";

    track("Velocidade_N"+nivel);
    track("VelocidadeInternet", {
      mbps: speed.toFixed(2),
      nivel: nivel
    });

  } else {
    statusVelocidade = "ERRO";
    track("Velocidade_Erro");
  }
});

// ================= CLIQUE =================
document.getElementById("btnShopee").addEventListener("click", async function(e){
  e.preventDefault();

  this.innerText = "Redirecionando...";

  let wait = 0;
  while(statusVelocidade==="NR" && wait < 800){
    await new Promise(r=>setTimeout(r,50));
    wait+=50;
  }

  let tagVelocidade;

  if(statusVelocidade==="OK"){
    tagVelocidade = "N"+nivel;
  } 
  else if(statusVelocidade==="ERRO"){
    tagVelocidade = "NE";
  } 
  else {
    tagVelocidade = "NR";
    track("Velocidade_Rapido");
  }

  track("ClickShopee");

  let finalUC = (UC + tempoLabel + tagVelocidade)
    .replace(/[^a-zA-Z0-9]/g,"");

  let finalURL = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`;

  window.location.href = finalURL;
});

})();
</script>

</body>
</html>
