<!DOCTYPE html>
<html lang="pt-br">
<head>

<script>

n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  background:#E74B2E;
  display:flex;
  justify-content:center;
  align-items:center;
}
.botao{
  background:#fff;
  color:#E74B2E;
  padding:20px 60px;
  font-size:26px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="btnShopee" class="botao">Abrir a Shopee</div>

<script>
(function(){

function track(e,d={}){fbq('trackCustom',e,d)}

const params=new URLSearchParams(window.location.search)

let LINK=null,UC=null

const raw=params.get("dest")

if(raw && raw.includes("|||")){
  const p=raw.split("|||")
  LINK=p[0]
  UC=p[1]
}else{
  LINK=params.get("dest")
  UC=params.get("uc")
}

if(!LINK||!UC){
  alert("Erro parâmetros")
  throw new Error()
}

// ================= TEMPO =================
let tempo=0,tempoLabel="S0"

const tempoInterval = setInterval(()=>{
  tempo++
  if(tempo<=30){
    tempoLabel="S"+(tempo-1)+"a"+tempo
    track("Tempo_"+tempoLabel)
  }else{
    clearInterval(tempoInterval)
  }
},1000)

// ================= CLASSIFICAR =================
function classificar(mbps){
  if(mbps <= 0.5) return 1
  if(mbps <= 1) return 2
  if(mbps <= 2) return 3
  if(mbps <= 4) return 4
  if(mbps <= 6) return 5
  if(mbps <= 10) return 6
  if(mbps <= 15) return 7
  if(mbps <= 20) return 8
  if(mbps <= 25) return 9
  return 10
}

// ================= VELOCIDADE =================
let velocidade=null

async function medirVelocidade(){
  try{
    const controller=new AbortController()

    setTimeout(()=>controller.abort(),4000) // corrigido

    let totalBytes=0
    const start=performance.now()

    const res=await fetch("https://speed.hetzner.de/1MB.bin",{
      signal:controller.signal,
      cache:"no-store"
    })

    const reader=res.body.getReader()

    while(true){
      const {done,value}=await reader.read()
      if(done)break
      totalBytes+=value.length
    }

    const duration=(performance.now()-start)/1000

    if(totalBytes>0){
      velocidade=(totalBytes*8/duration)/(1024*1024)

      const nivel=classificar(velocidade)

      track("Velocidade_N"+nivel)
      track("VelocidadeInternet",{mbps:velocidade.toFixed(2),nivel})
    }

  }catch(e){
    // fallback inteligente (não perde dado)
    velocidade=0.5
    const nivel=classificar(velocidade)
    track("Velocidade_N"+nivel)
  }
}

medirVelocidade()

// ================= CLIQUE =================
document.getElementById("btnShopee").addEventListener("click",function(e){

  const rect=this.getBoundingClientRect()
  const x=e.clientX - rect.left
  const largura=rect.width

  let lado

  const inicioCentro = largura * 0.45
  const fimCentro = largura * 0.55

  if(x < inicioCentro){
    lado="L"
  }else if(x > fimCentro){
    lado="R"
  }else{
    lado="C"
  }

  const tempoClick=tempoLabel

  let tag

  if(velocidade){
    tag="N"+classificar(velocidade)
  }else{
    tag="N5"
  }

  track("ClickShopee",{lado})

  const finalUC=(UC+tempoClick+tag+lado).replace(/[^a-zA-Z0-9]/g,"")

  const url=`https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

  window.location.href=url

})

})();
</script>

</body>
</html>
