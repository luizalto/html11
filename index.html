<body>

<div id="btnShopee" class="botao">Abrir a Shopee</div>

<script>
(function(){

function track(e,d={}){fbq('trackCustom',e,d)}

const params=new URLSearchParams(window.location.search)

let LINK=null,UC=null

const raw=params.get("dest")

if(raw && raw.includes("|||")){
  const p=raw.split("|||")
  LINK=p[0]
  UC=p[1]
}else{
  LINK=params.get("dest")
  UC=params.get("uc")
}

if(!LINK||!UC){
  alert("Erro parâmetros")
  throw new Error()
}

// TEMPO
let tempo=0,tempoLabel="S0"

setInterval(()=>{
  tempo++
  if(tempo<=30){
    tempoLabel="S"+(tempo-1)+"a"+tempo
    track("Tempo_"+tempoLabel)
  }
},1000)

// CLASSIFICAR
function classificar(mbps){
  if(mbps<=1)return 1
  if(mbps<=2)return 2
  if(mbps<=4)return 3
  if(mbps<=8)return 4
  if(mbps<=16)return 5
  if(mbps<=32)return 6
  if(mbps<=64)return 7
  if(mbps<=128)return 8
  if(mbps<=256)return 9
  return 10
}

// ================= VELOCIDADE (INICIA AO ABRIR) =================
let velocidade = null
let terminou = false

async function medirVelocidade(){

  const controller=new AbortController()
  setTimeout(()=>controller.abort(),1000)

  let totalBytes=0
  const start=performance.now()

  try{
    const res=await fetch("https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js",{
      signal:controller.signal,
      cache:"no-store"
    })

    const reader=res.body.getReader()

    while(true){
      const {done,value}=await reader.read()
      if(done)break
      totalBytes+=value.length
    }

  }catch(e){}

  const duration=(performance.now()-start)/1000

  if(totalBytes>0){
    velocidade=(totalBytes*8/duration)/(1024*1024)
  }

  terminou = true
}

// DISPARA IMEDIATO AO ENTRAR
medirVelocidade()

// CLIQUE
document.getElementById("btnShopee").addEventListener("click", async function(){

  this.innerText="Carregando..."

  const tempoClick=tempoLabel

  // ESPERA SE AINDA NÃO TERMINOU
  let wait=0
  while(!terminou && wait<1000){
    await new Promise(r=>setTimeout(r,50))
    wait+=50
  }

  let tag

  if(velocidade){
    const nivel=classificar(velocidade)
    tag="N"+nivel

    track("Velocidade_N"+nivel)
    track("VelocidadeInternet",{mbps:velocidade.toFixed(2),nivel})

  }else{
    tag="NE"
    track("Velocidade_Erro")
  }

  track("ClickShopee")

  const finalUC=(UC+tempoClick+tag).replace(/[^a-zA-Z0-9]/g,"")

  const url=`https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

  window.location.href=url

})

})();
</script>
