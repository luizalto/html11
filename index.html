<a href="#" id="btnShopee" class="botao">Abrir a Shopee</a>

<script>
(function(){

// ================= TRACK GLOBAL =================
function trackAll(eventName, data = {}) {
  fbq('trackCustom', eventName, data);
  pintrk('track', eventName, data);
}

// ================= PARÂMETROS =================
const params = new URLSearchParams(window.location.search);

let LINK_SHOPEE = null;
let UC = null;

const raw = params.get("dest");

if (raw && raw.includes("|||")) {
  const partes = raw.split("|||");
  LINK_SHOPEE = partes[0];
  UC = partes[1];
}

if (!LINK_SHOPEE) {
  LINK_SHOPEE = params.get("dest");
  UC = params.get("uc");
}

if (!LINK_SHOPEE || !UC) {
  alert("Erro: link ou UC não informado.");
  throw new Error("Parâmetros inválidos");
}

// ================= TEMPO =================
let tempo=0, tempoLabel="", disparouS30=false;

let tempoS0a1=false;
let tempoS1a2=false;

let evento01=false;
let evento02=false;

let clickRight=false;

function tempoLoop(){
  tempo++;

  if(tempo<=30){
    tempoLabel="S"+(tempo-1)+"a"+tempo;
    trackAll("Tempo_"+tempoLabel);
  }else if(!disparouS30){
    tempoLabel="S30";
    trackAll("Tempo_S30");
    disparouS30=true;
  }

  if(tempoLabel==="S0a1"){ tempoS0a1=true; checkEventos(); }
  if(tempoLabel==="S1a2"){ tempoS1a2=true; checkEventos(); }
}

tempoLoop();
setInterval(tempoLoop,1000);

// ================= EVENTOS =================
function checkEventos(){
  if(clickRight && tempoS0a1 && !evento02){
    trackAll('EVENTO02');
    evento02=true;
  }
  if(clickRight && tempoS1a2 && !evento01){
    trackAll('EVENTO01');
    evento01=true;
  }
}

// ================= VELOCIDADE =================
let velocidadeMbps = 0;
let nivelVelocidade = 1;

function classificarVelocidade(mbps) {
  if (mbps <= 1) return 1;
  if (mbps <= 2) return 2;
  if (mbps <= 4) return 3;
  if (mbps <= 8) return 4;
  if (mbps <= 16) return 5;
  if (mbps <= 32) return 6;
  if (mbps <= 64) return 7;
  if (mbps <= 128) return 8;
  if (mbps <= 256) return 9;
  return 10;
}

function testarVelocidade(callback) {
  const image = new Image();
  const startTime = Date.now();
  const tamanhoBytes = 500000;

  image.onload = function () {
    const duration = (Date.now() - startTime) / 1000;
    const bitsLoaded = tamanhoBytes * 8;
    const speedMbps = (bitsLoaded / duration / (1024 * 1024));

    callback(speedMbps);
  };

  image.src = "https://via.placeholder.com/1000x1000.jpg?cache=" + Math.random();
}

testarVelocidade(function(speed){
  velocidadeMbps = speed;
  nivelVelocidade = classificarVelocidade(speed);

  trackAll("VelocidadeInternet", {
    mbps: speed.toFixed(2),
    nivel: nivelVelocidade
  });
});

// ================= CLIQUE =================
document.getElementById("btnShopee").addEventListener("click", function(e){
  e.preventDefault();

  const btn = this;
  btn.innerText = "Redirecionando...";

  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const largura = rect.width;

  let pos;

  const inicioCentro = largura * 0.45;
  const fimCentro = largura * 0.55;

  if (x < inicioCentro) pos = "Left";
  else if (x > fimCentro) pos = "Right";
  else pos = "Center";

  trackAll('ClickShopee', { position: pos, uc: UC });

  if (pos === "Left") trackAll('ClickShopee_Left');
  else if (pos === "Center") trackAll('ClickShopee_Center');
  else trackAll('ClickShopee_Right');

  if(pos === "Right"){
    clickRight = true;
    checkEventos();
  }

  fbq('track', 'InitiateCheckout');
  pintrk('track', 'checkout');

  // UC FINAL COM TEMPO + NÍVEL
  let tempoFinal = tempoLabel || "S0";

  let finalUC = (UC + tempoFinal + "N" + nivelVelocidade)
    .replace(/[^a-zA-Z0-9]/g,"");

  const link = encodeURIComponent(LINK_SHOPEE);

  const finalURL = `https://shopee-utm-tracker.onrender.com/?link=${link}&pos=${pos}&uc=${finalUC}`;

  setTimeout(() => {
    window.location.href = finalURL;
  }, 200);
});

})();
</script>
