<a href="#" id="btnShopee" class="botao">Abrir a Shopee</a>

<script>
(function(){

function track(event, data={}){
  fbq('trackCustom', event, data);
}

// ================= PARAMETROS =================
const params = new URLSearchParams(window.location.search);

let LINK = null;
let UC = null;

const raw = params.get("dest");

if (raw && raw.includes("|||")) {
  const partes = raw.split("|||");
  LINK = partes[0];
  UC = partes[1];
} else {
  LINK = params.get("dest");
  UC = params.get("uc");
}

if (!LINK || !UC) {
  alert("Erro parâmetros");
  throw new Error("Parâmetros inválidos");
}

// ================= TEMPO =================
let tempo = 0;
let tempoLabel = "S0";

setInterval(()=>{
  tempo++;
  if(tempo<=30){
    tempoLabel = "S"+(tempo-1)+"a"+tempo;
    track("Tempo_"+tempoLabel);
  }
},1000);

// ================= CLASSIFICAR =================
function classificar(mbps){
  if (mbps <= 1) return 1;
  if (mbps <= 2) return 2;
  if (mbps <= 4) return 3;
  if (mbps <= 8) return 4;
  if (mbps <= 16) return 5;
  if (mbps <= 32) return 6;
  if (mbps <= 64) return 7;
  if (mbps <= 128) return 8;
  if (mbps <= 256) return 9;
  return 10;
}

// ================= VELOCIDADE REAL (FETCH) =================
function testarVelocidade() {
  return new Promise(async (resolve) => {

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 1000); // 1s limite

    let totalBytes = 0;
    const start = performance.now();

    try {
      const response = await fetch("https://speed.hetzner.de/10MB.bin", {
        signal: controller.signal,
        cache: "no-store"
      });

      const reader = response.body.getReader();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        totalBytes += value.length;
      }

    } catch (e) {
      // abort esperado
    }

    clearTimeout(timeout);

    const duration = (performance.now() - start) / 1000;

    if (totalBytes === 0 || duration === 0) {
      resolve(null);
      return;
    }

    const speedMbps = (totalBytes * 8 / duration) / (1024 * 1024);

    resolve(speedMbps);
  });
}

// inicia ao carregar
let velocidadePromise = testarVelocidade();

// ================= CLIQUE =================
document.getElementById("btnShopee").addEventListener("click", async function(e){
  e.preventDefault();

  this.innerText = "Carregando...";

  let tempoClick = tempoLabel;

  let speed = await velocidadePromise;

  let tagVelocidade;

  if(speed){
    let nivel = classificar(speed);
    tagVelocidade = "N"+nivel;

    track("Velocidade_N"+nivel);
    track("VelocidadeInternet", {
      mbps: speed.toFixed(2),
      nivel: nivel
    });

  } else {
    tagVelocidade = "NE";
    track("Velocidade_Erro");
  }

  track("ClickShopee");

  let finalUC = (UC + tempoClick + tagVelocidade)
    .replace(/[^a-zA-Z0-9]/g,"");

  let finalURL = `https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`;

  window.location.href = finalURL;
});

})();
</script>

</body>
